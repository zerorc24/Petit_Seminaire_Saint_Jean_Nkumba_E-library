<h2>{{ action }} Book</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">
        {{ action }}
    </button>
</form>
<a href="{% url 'library' %}" class="text-blue-500">Cancel</a>
