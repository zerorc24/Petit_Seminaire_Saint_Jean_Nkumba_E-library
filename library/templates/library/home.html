{% extends "library/base.html" %}
{% load static %}

{% block title %}Library | Petit Séminaire Saint Jean Nkumba{% endblock %}

{% block content %}

<style>
:root{
  --main-blue:#0d47a1;
  --light-blue:#1565c0;
  --text-gray:#555;
  --white:#ffffff;
}

/* ---------- RESET ---------- */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  overflow-x:hidden;
  font-family:Arial,sans-serif;
  background:#f4f6fb;
  color:#333;
  line-height:1.6;
}

/* ---------- HERO ---------- */
.hero{
  width:100%;
  height:100vh;
  overflow:hidden;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* ---------- LARGE TABLETS ---------- */
@media screen and (max-width:992px){
  .hero{
    height:75vh;
  }
}

/* ---------- TABLETS ---------- */
@media screen and (max-width:768px){
  .hero{
    height:60vh;
  }
}

/* ---------- PHONES ---------- */
@media screen and (max-width:480px){
  .hero{
    height:45vh;
  }
}

/* ---------- VERY SMALL PHONES ---------- */
@media screen and (max-width:360px){
  .hero{
    height:38vh;
  }
}

/* ---------- CTA ---------- */
.cta{
  width:calc(100% - 40px);
  margin:40px auto;
  padding:40px 20px;
  text-align:center;
  background:linear-gradient(120deg,var(--main-blue),var(--light-blue));
  border-radius:20px;
  color:#fff;
}

.cta h2{
  font-size:2rem;
  margin-bottom:20px;
}

.cta button{
  padding:14px 28px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:var(--main-blue);
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

.cta button:hover{
  background:#e3f2fd;
}

/* ---------- MOBILE CTA ---------- */
@media screen and (max-width:768px){

  .cta{
    width:calc(100% - 24px);
    padding:30px 15px;
    border-radius:16px;
  }

  .cta h2{
    font-size:1.5rem;
  }

  .cta button{
    width:100%;
    max-width:260px;
  }
}
</style>

<!-- Hero -->
<section class="hero">
    <img src="{% static 'images/sky-header.png' %}" alt="Hero Image">
</section>

<!-- CTA -->
<section class="cta">
    <h2>Start Learning Today</h2>

    {% if user.is_authenticated %}
        <button onclick="location.href='{% url 'library' %}'">
            Open Library
        </button>
    {% else %}
        <button onclick="location.href='{% url 'login' %}?next={% url 'library' %}'">
            Open Library
        </button>
    {% endif %}
</section>

{% endblock %}
