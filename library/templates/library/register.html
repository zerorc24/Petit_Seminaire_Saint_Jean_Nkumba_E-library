{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account | Digital Library</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0d47a1,#1976d2);
font-family:Arial, sans-serif;
}

.card{
width:400px;
background:#ffffff;
padding:40px;
border-radius:16px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
}

/* subtle glow effect */
.card::before{
content:"";
position:absolute;
top:-80px;
left:-80px;
width:160px;
height:160px;
background:rgba(13,71,161,0.15);
border-radius:50%;
filter:blur(20px);
}

.logo{
width:80px;
margin-bottom:10px;
}

h2{
margin:8px 0;
font-size:20px;
color:#0d47a1;
}

.subtitle{
color:#666;
font-size:13px;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border-radius:8px;
border:1px solid #e0e0e0;
outline:none;
transition:0.2s;
background:#f9fbff;
}

input:focus{
border-color:#0d47a1;
box-shadow:0 0 0 3px rgba(13,71,161,0.15);
}

button{
width:100%;
padding:13px;
margin-top:15px;
background:linear-gradient(90deg,#0d47a1,#1976d2);
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(13,71,161,0.3);
}

.messages{
font-size:13px;
margin-bottom:10px;
color:#d32f2f;
}

.footer{
margin-top:18px;
font-size:12px;
color:#777;
}

a{
color:#0d47a1;
text-decoration:none;
font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<img src="{% static 'images/pssj-nkumba-logo.png' %}" class="logo" alt="Logo">

<h2>Create Account</h2>
<div class="subtitle">Join PSSJ Nkumba Digital Library</div>

<!-- MESSAGES -->
{% if messages %}
    {% for message in messages %}
        <div class="messages">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email address" required>
    <input type="password" name="password" placeholder="Create password" required>

    <button type="submit">Create Account</button>
</form>

<p style="margin-top:12px;">
    Already have an account?
    <a href="{% url 'login' %}">Login here</a>
</p>

<div class="footer">
Secure registration · Admin approval required
</div>

</div>

</body>
</html>
