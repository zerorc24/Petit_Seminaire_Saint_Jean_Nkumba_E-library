{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Digital Library</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0d47a1,#1976d2);
font-family:Arial,sans-serif;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:#ffffff;
padding:40px 30px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
animation:fadeIn 0.5s ease;
}

/* GLOW EFFECT */
.card::before{
content:"";
position:absolute;
top:-80px;
left:-80px;
width:160px;
height:160px;
background:rgba(13,71,161,0.15);
border-radius:50%;
filter:blur(20px);
}

/* LOGO */
.logo{
width:85px;
height:85px;
object-fit:contain;
margin-bottom:12px;
}

/* TITLES */
h2{
margin:8px 0;
font-size:24px;
color:#0d47a1;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

/* INPUTS */
.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #e0e0e0;
outline:none;
transition:0.3s;
background:#f9fbff;
font-size:15px;
}

input:focus{
border-color:#0d47a1;
box-shadow:0 0 0 3px rgba(13,71,161,0.15);
background:#fff;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
background:linear-gradient(90deg,#0d47a1,#1976d2);
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(13,71,161,0.3);
}

/* MESSAGES */
.messages{
background:#ffebee;
color:#d32f2f;
padding:10px;
border-radius:8px;
font-size:13px;
margin-bottom:15px;
}

/* LINKS */
a{
color:#0d47a1;
text-decoration:none;
font-size:14px;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:12px;
color:#777;
line-height:1.5;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE DESIGN */
@media(max-width:480px){

.card{
padding:30px 20px;
border-radius:15px;
}

h2{
font-size:20px;
}

.subtitle{
font-size:13px;
}

.logo{
width:70px;
height:70px;
}

input{
padding:12px;
font-size:14px;
}

button{
padding:12px;
font-size:14px;
}

.footer{
font-size:11px;
}

}

@media(max-width:320px){

.card{
padding:25px 15px;
}

h2{
font-size:18px;
}

.subtitle{
font-size:12px;
}

input{
font-size:13px;
}

button{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="card">

<img src="{% static 'images/pssj-nkumba-logo.png' %}" 
class="logo" 
alt="Logo">

<h2>Create Account</h2>

<div class="subtitle">
Join PSSJ Nkumba Digital Library
</div>

<!-- MESSAGES -->

{% if messages %}
    {% for message in messages %}
        <div class="messages">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    <div class="input-group">
        <input type="text" 
               name="username" 
               placeholder="Username" 
               required>
    </div>

    <div class="input-group">
        <input type="email" 
               name="email" 
               placeholder="Email address" 
               required>
    </div>

    <div class="input-group">
        <input type="password" 
               name="password" 
               placeholder="Create password" 
               required>
    </div>

    <button type="submit">
        Create Account
    </button>

</form>

<p style="margin-top:15px;font-size:14px;">
    Already have an account?
    <a href="{% url 'login' %}">
        Login here
    </a>
</p>

<div class="footer">
Secure registration <br>
Admin approval required
</div>

</div>

</body>
</html>
