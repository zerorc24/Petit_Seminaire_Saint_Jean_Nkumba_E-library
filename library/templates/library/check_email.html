<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Email</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0d47a1,#1976d2);
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:#fff;
padding:45px 30px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
animation:fadeIn 0.5s ease;
}

/* GLOW EFFECT */
.card::before{
content:"";
position:absolute;
top:-80px;
right:-80px;
width:170px;
height:170px;
background:rgba(13,71,161,0.1);
border-radius:50%;
filter:blur(20px);
}

/* ICON */
.icon{
font-size:60px;
margin-bottom:15px;
}

/* TITLE */
h2{
font-size:28px;
color:#0d47a1;
margin-bottom:15px;
}

/* MESSAGE */
.message{
font-size:15px;
color:#555;
line-height:1.7;
margin-bottom:30px;
}

/* BUTTON LINK */
a{
display:inline-block;
width:100%;
padding:14px;
background:linear-gradient(90deg,#0d47a1,#1976d2);
color:white;
text-decoration:none;
border-radius:12px;
font-size:15px;
font-weight:bold;
transition:0.3s;
}

a:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(13,71,161,0.3);
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */
@media(max-width:480px){

.card{
padding:35px 20px;
border-radius:16px;
}

.icon{
font-size:50px;
}

h2{
font-size:22px;
}

.message{
font-size:14px;
}

a{
padding:12px;
font-size:14px;
}

}

@media(max-width:320px){

.card{
padding:30px 15px;
}

h2{
font-size:20px;
}

.message{
font-size:13px;
}

a{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="icon">
📧
</div>

<h2>Check your email</h2>

<div class="message">
We sent you a verification link.<br>
Please check your inbox and verify your account before logging in.
</div>

<a href="{% url 'login' %}">
    Go to Login
</a>

</div>

</body>
</html>
