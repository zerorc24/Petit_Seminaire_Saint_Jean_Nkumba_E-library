{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSSJ Nkumba | Digital Library</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0d47a1;
font-family:Arial, sans-serif;
}

/* CARD */

.login-card{
width:380px;
background:#ffffff;
padding:35px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.login-card img{
width:90px;
margin-bottom:10px;
}

/* TEXT */

h2{
margin:5px 0;
font-size:18px;
letter-spacing:1px;
}

.subtitle{
color:#555;
font-size:14px;
margin-bottom:20px;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
background:#fffde7;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0d47a1;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1565c0;
}

/* ERROR */

.error{
color:red;
font-size:13px;
margin-bottom:10px;
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="login-card">

<img src="{% static 'images/pssj-nkumba-logo.png' %}" alt="Logo">

<h2>PETIT SÉMINAIRE SAINT JEAN</h2>
<h2>NKUMBA</h2>

<div class="subtitle">Digital Library System</div>

{% if messages %}
    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
Authorized users only · PSSJ Nkumba
</div>

</div>

</body>
</html>
